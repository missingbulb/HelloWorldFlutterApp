name: tests

# Per-commit signal: compiles the Dart and runs the widget test on every push.
# Does NOT build an APK — that lives in the manual "Build Release Version" workflow.
on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # The ~600s teardown stall documented in CLAUDE.md is specific to this repo's
      # sandbox (dropped outbound sockets); GitHub runners have normal networking,
      # so `flutter test` completes cleanly here.
      - run: flutter test
